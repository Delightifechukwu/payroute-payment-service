version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: payroute-db
    environment:
      POSTGRES_DB: payroute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payroute"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payroute-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payroute
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev_secret_change_me}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: payroute-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8080

volumes:
  postgres_data:
